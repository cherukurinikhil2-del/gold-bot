name: Gold FVG Signal Bot

on:
  schedule:
    # Every 5 mins, full 24 hours, Monday to Friday
    - cron: "*/5 * * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run Gold FVG Bot every 60 seconds for 5 minutes
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for i in 1 2 3 4 5; do
            echo "🔁 Run $i / 5 — $(date -u)"
            python gold_bot.py
            if [ $i -lt 5 ]; then
              echo "⏳ Sleeping 60 seconds..."
              sleep 60
            fi
          done

      - name: 💾 Save bot state to repo
        if: always()
        run: |
          git config user.name "gold-bot"
          git config user.email "gold-bot@users.noreply.github.com"
          git add bot_state.json || true
          git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
          git push || true
